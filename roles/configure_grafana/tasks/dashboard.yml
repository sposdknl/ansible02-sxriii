---
# Automatický import dashboardu ze souboru, což umožňuje verziování vizualizací
- name: Import dashboard for Zabbix server
  community.grafana.grafana_dashboard:
    url: "http://192.168.1.3:3000"
    url_username: admin
    url_password: "{{ grafana_admin_password }}"
    path: "{{ role_path }}/files/ZabbixServerDashboard.json"
    state: present
    overwrite: yes # Přepíše dashboard, pokud už existuje, pro aktualizace
    
- name: Import dashboard for All nodes
  community.grafana.grafana_dashboard:
    url: "http://192.168.1.3:3000"
    url_username: admin
    url_password: "{{ grafana_admin_password }}"
    path: "{{ role_path }}/files/AllNodesDashboard.json"
    state: present
    overwrite: yes